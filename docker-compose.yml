services:
  # Redis: Message Broker para eventos en tiempo real
  redis:
    image: redis:7-alpine
    container_name: agency_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agency_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # AI Worker: Python + FastAPI + CrewAI/AutoGen
  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: agency_ai_worker
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_PORT=8001
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./ai-worker:/app
    networks:
      - agency_network
    restart: unless-stopped

  # Gateway: Go + Fiber + WebSockets
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: agency_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_PORT=8000
      - AI_WORKER_URL=http://ai-worker:8001
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      ai-worker:
        condition: service_started
    volumes:
      - ./gateway:/app
    networks:
      - agency_network
    restart: unless-stopped

  # Frontend: Next.js — Luva Mission Control
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agency_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway:8000
      - NEXT_PUBLIC_WS_URL=ws://gateway:8000/ws
      - NODE_ENV=production
      # Mount your memory files here: MEMORY_PATH=/memory
      - MEMORY_PATH=/memory
    depends_on:
      - gateway
    volumes:
      # Mount the memory directory so the API can read agent files
      - ${MEMORY_PATH:-./frontend/memory}:/memory:ro
    networks:
      - agency_network
    restart: unless-stopped

networks:
  agency_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
