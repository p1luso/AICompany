services:
  # Redis: Message Broker para eventos en tiempo real
  redis:
    image: redis:7-alpine
    container_name: agency_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agency_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama: Local LLM server
  ollama:
    image: ollama/ollama:latest
    container_name: agency_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agency_network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || true"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # AI Worker: Python + FastAPI + CrewAI + Ollama
  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: agency_ai_worker
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_PORT=8001
      - LOG_LEVEL=info
      # Ollama — apunta al servicio Docker
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      # Ruta donde los agentes escriben outputs .md
      - MEMORY_OUTPUT_PATH=/memory
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./ai-worker:/app
      # Volumen compartido: el AI Worker ESCRIBE aquí
      - ./frontend/memory:/memory
    networks:
      - agency_network
    restart: unless-stopped

  # Gateway: Go + Fiber + WebSockets
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: agency_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - GATEWAY_PORT=8000
      - AI_WORKER_URL=http://ai-worker:8001
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      ai-worker:
        condition: service_started
    networks:
      - agency_network
    restart: unless-stopped

  # Frontend: Next.js — Luva Mission Control
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agency_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://gateway:8000
      - NEXT_PUBLIC_WS_URL=ws://gateway:8000/ws
      - NODE_ENV=production
      - MEMORY_PATH=/memory
    depends_on:
      - gateway
    volumes:
      # Volumen compartido: el frontend solo LEE (ro)
      - ./frontend/memory:/memory:ro
    networks:
      - agency_network
    restart: unless-stopped

networks:
  agency_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local
